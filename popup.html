<!DOCTYPE html>
<html>
<head>
  <title>OFM Typing Cheat</title>
  <style>
    body { 
      width: 250px; 
      padding: 20px; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }
    h2 { 
      font-size: 18px; 
      margin-bottom: 20px; 
      color: #006E42;
      text-align: center;
    }
    .field { 
      margin-bottom: 15px; 
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      font-weight: 600;
    }
    input { 
      width: 100%; 
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    button { 
      width: 100%; 
      padding: 10px; 
      background-color: #006E42; 
      color: white; 
      border: none; 
      border-radius: 4px;
      cursor: pointer; 
      font-size: 14px;
      font-weight: 600;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #013822;
    }
    #status {
      text-align: center;
      font-size: 12px;
      color: #2e7d32;
      margin-top: 10px;
      height: 15px;
    }
  </style>
</head>
<body>
  <h2>Cheat Settings</h2>
  <div class="field">
    <label for="wpm">Target Speed (WPM):</label>
    <input type="number" id="wpm" value="60" min="10" max="150">
  </div>
  <button id="save">Save Config</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
